apiVersion: v1
kind: Secret
metadata:
  name: salkim-secrets
  namespace: salkim
type: Opaque
stringData:
  DB_USER: "salkim_user"
  DB_PASSWORD: "CHANGE_ME"
  DB_NAME: "salkim_db"
  DATABASE_URL: "postgresql://salkim_user:CHANGE_ME@salkim-postgres:5432/salkim_db"
  CELERY_BROKER_URL: "redis://salkim-redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://salkim-redis:6379/0"
  MINIO_ENDPOINT: "salkim-minio:9000"
  MINIO_ROOT_USER: "salkim_admin"
  MINIO_ROOT_PASSWORD: "CHANGE_ME"
  MINIO_ACCESS_KEY: "salkim_admin"
  MINIO_SECRET_KEY: "CHANGE_ME"
  JWT_SECRET_KEY: "CHANGE_ME_PRODUCTION_SECRET"
