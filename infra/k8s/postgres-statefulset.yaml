apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: salkim-postgres
  namespace: salkim
spec:
  serviceName: "salkim-postgres"
  replicas: 1
  selector:
    matchLabels:
      app: salkim-postgres
  template:
    metadata:
      labels:
        app: salkim-postgres
    spec:
      containers:
        - name: postgres
          image: timescale/timescaledb:latest-pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: salkim-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: salkim-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: salkim-secrets
                  key: DB_NAME
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: salkim-postgres
  namespace: salkim
spec:
  selector:
    app: salkim-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
