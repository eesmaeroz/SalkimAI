apiVersion: apps/v1
kind: Deployment
metadata:
  name: salkim-api
  namespace: salkim
  labels:
    app: salkim-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: salkim-api
  template:
    metadata:
      labels:
        app: salkim-api
    spec:
      containers:
        - name: api
          image: salkim-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: salkim-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: salkim-api
  namespace: salkim
spec:
  selector:
    app: salkim-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: salkim-api-hpa
  namespace: salkim
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: salkim-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
