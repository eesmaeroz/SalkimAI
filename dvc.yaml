stages:
  create_sample_data:
    cmd: python scripts/create_sample_data.py
    deps:
      - scripts/create_sample_data.py
    outs:
      - data/raw/greenhouse_data.csv

  make_features:
    cmd: python -m ml.prediction.features.feature_engineering
    deps:
      - data/raw/greenhouse_data.csv
      - ml/prediction/features/feature_engineering.py
      - ml/prediction/features/gdd_calculator.py
      - ml/prediction/features/weather_api_mock.py
      - ml/prediction/features/openweathermap_client.py
      - config/params.yaml
      - config/schema.yaml
    outs:
      - data/processed/greenhouse_features.csv
    metrics:
      - reports/feature_report.json:
          cache: false
    params:
      - config/params.yaml:
          - feature_engineering.tomato_base_temperature_C
          - feature_engineering.weather_provider
          - feature_engineering.use_mock_weather_when_missing
          - weather
          - openweathermap

  train:
    cmd: python -m ml.prediction.training.train_model
    deps:
      - data/processed/greenhouse_features.csv
      - ml/prediction/training/train_model.py
      - config/params.yaml
    outs:
      - models/random_forest_yield_model.joblib
    metrics:
      - reports/metrics.json:
          cache: false
    params:
      - config/params.yaml:
          - training
          - mlflow.experiment_name
          - mlflow.run_name

  train_harvest:
    cmd: python -m ml.prediction.training.train_harvest_model
    deps:
      - data/processed/greenhouse_features.csv
      - ml/prediction/training/train_harvest_model.py
      - config/params.yaml
    outs:
      - models/xgboost_harvest_date_model.joblib
    metrics:
      - reports/harvest_metrics.json:
          cache: false
    params:
      - config/params.yaml:
          - harvest_training
          - mlflow.experiment_name

  predict_harvest:
    cmd: python -m ml.prediction.inference.predict_harvest_date
    deps:
      - data/processed/greenhouse_features.csv
      - models/xgboost_harvest_date_model.joblib
      - ml/prediction/inference/predict_harvest_date.py
      - config/params.yaml
    outs:
      - reports/harvest_predictions.csv
