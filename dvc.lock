    params:
      config/params.yaml:
        feature_engineering.tomato_base_temperature_C: 10
        feature_engineering.use_mock_weather_when_missing: true
        feature_engineering.weather_provider: mock
        openweathermap:
          api_url: https://api.openweathermap.org/data/2.5/forecast
          api_key_env: OPENWEATHERMAP_API_KEY
